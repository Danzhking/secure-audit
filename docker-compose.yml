services:

  postgres:
    image: postgres:16
    container_name: secure_audit_postgres
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: auditpass
      POSTGRES_DB: auditdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d auditdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: secure_audit_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  collector:
    build:
      context: ./services/collector
      dockerfile: Dockerfile
    container_name: secure_audit_collector
    restart: on-failure
    ports:
      - "8443:8443"
    environment:
      RABBIT_URL: "amqp://guest:guest@rabbitmq:5672/"
      TLS_CERT: "/certs/server.crt"
      TLS_KEY: "/certs/server.key"
      API_KEYS: "service-key-auth-001,service-key-files-002"
      HMAC_SECRET: "super-secret-hmac-key-change-in-production"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      rabbitmq:
        condition: service_healthy

  processor:
    build:
      context: ./services/processor
      dockerfile: Dockerfile
    container_name: secure_audit_processor
    restart: on-failure
    environment:
      RABBIT_URL: "amqp://guest:guest@rabbitmq:5672/"
      POSTGRES_URL: "postgres://audit:auditpass@postgres:5432/auditdb?sslmode=disable"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: secure_audit_api
    ports:
      - "8081:8081"
    environment:
      POSTGRES_URL: "postgres://audit:auditpass@postgres:5432/auditdb?sslmode=disable"
      API_PORT: "8081"
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: secure_audit_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: secure_audit_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  grafana_data:
